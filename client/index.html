<!doctype html>
<html lang="en">
  <head>
    <!-- ================= BASIC ================= -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="theme-color"
      content="#ffffff"
    />

    <!-- ================= TITLE ================= -->
    <title>
      WhatNext Online | Himalayan Treks &
      Expeditions
    </title>

    <!-- ================= SEO ================= -->
    <meta
      name="description"
      content="Discover curated Himalayan trekking experiences, expeditions and cinematic mountain journeys across Uttarakhand and the Indian Himalayas."
    />

    <meta
      name="keywords"
      content="Himalayan treks, Valley Of Flowers Trek, Satopanth Tal Trek, Kagbhusandi Trek, Uttarakhand trekking, Himalayan expeditions"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="author"
      content="WhatNext Online"
    />

    <!-- ================= CANONICAL ================= -->
    <link
      rel="canonical"
      href="https://www.whatnextonline.in/"
    />

    <!-- ================= OPEN GRAPH ================= -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:title"
      content="WhatNext Online | Himalayan Treks & Expeditions"
    />

    <meta
      property="og:description"
      content="Curated Himalayan trekking experiences and unforgettable mountain journeys."
    />

    <meta
      property="og:image"
      content="https://www.whatnextonline.in/og/whatnextonline.webp"
    />

    <meta
      property="og:url"
      content="https://www.whatnextonline.in/"
    />

    <meta
      property="og:site_name"
      content="WhatNext Online"
    />

    <!-- ================= TWITTER ================= -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="WhatNext Online | Himalayan Treks & Expeditions"
    />

    <meta
      name="twitter:description"
      content="Curated Himalayan trekking experiences and unforgettable mountain journeys."
    />

    <meta
      name="twitter:image"
      content="https://www.whatnextonline.in/og/whatnextonline.webp"
    />

    <!-- ================= FAVICON ================= -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />

    <link
      rel="apple-touch-icon"
      href="/favicon.png"
    />

    <!-- ================= PRECONNECT ================= -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- ================= FONTS ================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ================= STRUCTURED DATA ================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "@type": "Organization",

        "name": "WhatNext Online",

        "url": "https://www.whatnextonline.in",

        "logo": "https://www.whatnextonline.in/favicon.png",

        "sameAs": [
          "https://www.instagram.com/",
          "https://www.facebook.com/"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
